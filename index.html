<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lux Futura</title>

<style>
/* --- Din originaldesign --- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at center, rgba(35,55,120,0.35), transparent 50%),
    linear-gradient(135deg,#050505,#0b1220,#050505);
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    padding:20px;
    -webkit-user-select:none;
    user-select:none;
    -webkit-font-smoothing:antialiased;
}

.container{
    max-width:700px;
    width:100%;
}

h1{
    font-size:4rem;
    letter-spacing:2px;
    margin-bottom:18px;
    font-weight:700;
    color:rgb(235,235,235);
    text-shadow: 0 0 6px rgba(255,255,255,0.18), 0 0 18px rgba(120,170,255,0.08);
}

.tagline{
    font-size:1.35rem;
    opacity:0.92;
    margin-bottom:18px;
    color:rgba(255,255,255,0.92);
}

.areas{
    font-size:0.95rem;
    letter-spacing:0.5px;
    opacity:0.72;
    margin-bottom:28px;
    color:rgba(255,255,255,0.78);
}

.sub{
    font-size:1rem;
    opacity:0.72;
    margin-bottom:25px;
}

/* --- Nytt: Form & Input Styling --- */
#signup-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
}

.email-input {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 14px 20px;
    border-radius: 6px;
    color: white;
    font-size: 1rem;
    width: 100%;
    max-width: 320px;
    outline: none;
    transition: all 0.3s ease;
    text-align: left;
}

.email-input:focus {
    border-color: #66ccff;
    background: rgba(255, 255, 255, 0.1);
}

.submit-btn {
    background: #66ccff;
    color: #050505;
    border: none;
    padding: 14px 30px;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    width: 100%;
    max-width: 320px;
    
    /* Detta sköter hur den fjädrar TILLBAKA (när du släpper) */
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s ease, box-shadow 0.2s;
}

.submit-btn:active {
    /* Detta händer INSTANT när man trycker ner */
    transform: scale(0.96) translateY(2px) !important; 
    transition: transform 0s !important; 
    filter: brightness(0.85);
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
}

.submit-btn:hover {
    background: #8ad8ff;
    transform: scale(1.02);
    box-shadow: 0 4px 15px rgba(102, 204, 255, 0.2);
}

.submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#response-msg {
    font-size: 0.95rem;
    color: #66ccff;
    margin-top: 10px;
    min-height: 1.2rem;
}

/* --- Kontaktlänk & Copyright --- */
.contact-link {
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-size: 0.85rem;
    transition: 0.2s;
}

.contact-link:hover {
    color: #66ccff;
}

.copyright{
    position:fixed;
    bottom:14px;
    left:18px;
    font-size:12px;
    color:rgba(255,255,255,0.32);
    font-weight:400;
    letter-spacing:0.4px;
}

@media (max-width:600px){
    h1{ font-size:2.7rem; }
    .tagline{ font-size:1.1rem; }
    .email-input, .submit-btn { max-width: 100%; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Lux Futura</h1>
    <div class="tagline">Tech for a Brighter Future</div>
    <div class="areas">AI • Environment • Energy • Automation</div>
    <div class="sub">Launching May 2026</div>

    <form id="signup-form">
        <input type="email" id="email" class="email-input" placeholder="Your email address" required>
        <button type="submit" class="submit-btn" id="btn">Notify me at launch</button>
        <p id="response-msg" style="display:none;"></p>
    </form>

    <a href="mailto:info@luxfutura.se" class="contact-link">Contact: info@luxfutura.se</a>
</div>

<div class="copyright">© 2026 Lux Futura</div>

<script>
    const form = document.getElementById('signup-form');
    const msg = document.getElementById('response-msg');
    const btn = document.getElementById('btn');
    const input = document.getElementById('email');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        // Visuell feedback
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // Skickar till Cloudflare Pages Function
            const res = await fetch('/api/submit', {
                method: 'POST',
                body: JSON.stringify({ email: input.value }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (res.ok) {
                msg.innerText = "Perfect. We'll be in touch in May.";
                msg.style.display = "block";
                input.style.display = "none";
                btn.style.display = "none";
            } else {
                throw new Error();
            }
        } catch (err) {
            msg.innerText = "Something went wrong. Please try again.";
            msg.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Notify me at launch";
        }
    };

    btn.addEventListener('touchstart', () => {
        // Kollar om telefonen stödjer vibration
        if (navigator.vibrate) {
            navigator.vibrate(15); // Ett extremt kort "tick"
        }
    });
</script>

</body>
</html>
