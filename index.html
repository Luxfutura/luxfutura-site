<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lux Futura</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center, rgba(35,55,120,0.35), transparent 50%),
linear-gradient(135deg,#050505,#0b1220,#050505);
font-family:Arial, sans-serif;
color:white;
text-align:center;
padding:20px;

-webkit-user-select:none;
-ms-user-select:none;
user-select:none;
-webkit-touch-callout:none;
}

.container{
max-width:700px;
width:100%;
}

h1{
font-size:4rem;
letter-spacing:2px;
margin-bottom:18px;
font-weight:700;
color:rgb(235,235,235);
text-shadow:
0 0 6px rgba(255,255,255,0.18),
0 0 18px rgba(120,170,255,0.08);
}

.tagline{
font-size:1.35rem;
opacity:0.92;
margin-bottom:18px;
color:rgba(255,255,255,0.92);
}

.areas{
font-size:0.95rem;
letter-spacing:0.5px;
opacity:0.72;
margin-bottom:28px;
color:rgba(255,255,255,0.78);
}

.sub{
font-size:1rem;
opacity:0.72;
margin-bottom:20px;
}

a{
color:#66ccff;
text-decoration:none;
font-size:1rem;
cursor:pointer;
transition:0.2s ease;

-webkit-user-select:none;
-ms-user-select:none;
user-select:none;

-webkit-tap-highlight-color: transparent;
outline:none;
}

a:focus,
a:active,
a:visited{
outline:none;
}

a:hover{
opacity:0.85;
}

@media (max-width: 600px) {

h1{
font-size:2.7rem;
letter-spacing:1px;
}

.tagline{
font-size:1.1rem;
}

.areas{
font-size:0.82rem;
line-height:1.6;
padding:0 10px;
}

.sub{
font-size:0.95rem;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Lux Futura</h1>

<div class="tagline">Tech for a Better Future</div>

<div class="areas">AI • Environment • Energy • Automation</div>

<div class="sub">Launching Soon</div>

<a href="mailto:info@luxfutura.se">info@luxfutura.se</a>

</div>

</body>
</html>
