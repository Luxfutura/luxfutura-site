<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lux Futura</title>

<style>
  
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#0d1320,#050505);
font-family:Arial, sans-serif;
color:white;
text-align:center;
padding:20px;

-webkit-user-select:none;
-ms-user-select:none;
user-select:none;
-webkit-touch-callout:none;
}

.container{
max-width:700px;
}

h1{
font-size:4rem;
letter-spacing:2px;
margin-bottom:20px;
font-weight:700;
}

.tagline{
font-size:1.4rem;
opacity:0.9;
margin-bottom:30px;
}

.sub{
font-size:1rem;
opacity:0.7;
margin-bottom:20px;
}

a{
color:#66ccff;
text-decoration:none;
font-size:1rem;

-webkit-user-select:text;
-ms-user-select:text;
user-select:text;
cursor:pointer;
}

a:hover{
opacity:0.8;
}

@media (max-width: 600px) {
  h1 {
    font-size: 2.6rem;
    letter-spacing: 1px;
  }

  .tagline {
    font-size: 1.1rem;
  }

  .sub {
    font-size: 0.95rem;
  }
}

</style>
  
</head>
  
<body>
<div class="container">
<h1>Lux Futura</h1>
<div class="tagline">Tech for humanity</div>
<div class="sub">Website launching soon.</div>
<a href="mailto:info@luxfutura.se">info@luxfutura.se</a>
</div>
</body>
</html>
